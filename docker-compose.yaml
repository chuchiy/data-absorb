version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: data-absorb-postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:11
    container_name: data-absorb-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3306:3306"
    volumes:
      - ./scripts/init_mariadb.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: data-absorb-oracle
    environment:
      ORACLE_PASSWORD: oraclepass
      ORACLE_DATABASE: testdb
    ports:
      - "1521:1521"
    volumes:
      - ./scripts/init_oracle.sql:/docker-entrypoint-initdb.d/init.sql
      - oracle_data:/opt/oracle/data
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 15

volumes:
  postgres_data:
  mariadb_data:
  oracle_data: