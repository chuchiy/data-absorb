# data-absorb 配置文件示例
# 数据库导出工具配置

[global]
# 并发 worker 数量
workers = 4
# 每个 batch 写入的行数
batch_size = 10000
# 默认输出格式: parquet | arrow
default_format = "parquet"
# 默认输出目录
output_dir = "./output"
# 是否覆盖已存在的文件
overwrite = false
# 日志级别: debug | info | warn | error
log_level = "info"

# 数据库连接配置
# 支持: postgres, mysql, sqlite, oracle, mssql
[[databases]]
name = "prod_postgres"
driver = "postgres"
dsn = "postgres://user:password@localhost:5432/mydb?sslmode=disable"
max_open_conns = 10
max_idle_conns = 5

[[databases]]
name = "prod_mysql"
driver = "mysql"
dsn = "user:password@tcp(localhost:3306)/mydb?charset=utf8mb4"

[[databases]]
name = "local_sqlite"
driver = "sqlite"
dsn = "./data.db"

# 导出任务配置
# 紧凑模式：批量导出表（自动生成文件名: 表名.parquet 或 表名.arrow）
[[tasks]]
db = "prod_postgres"
tables = ["users", "orders", "products"]

# 指定格式覆盖
[[tasks]]
db = "prod_mysql"
tables = ["customers", "invoices"]
format = "arrow"

# 自定义 SQL 模式（必须指定 output）
[[tasks]]
db = "prod_postgres"
query = """
SELECT 
    u.id as user_id,
    u.name as user_name,
    COUNT(o.id) as order_count,
    SUM(o.amount) as total_amount
FROM users u
LEFT JOIN orders o ON u.id = o.user_id
WHERE o.created_at >= '2024-01-01'
GROUP BY u.id, u.name
"""
output = "user_order_summary.parquet"
format = "parquet"